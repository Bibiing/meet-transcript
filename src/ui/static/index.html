<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PLN Meeting Transcriber</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #d9dee7;
        --text: #1d2430;
        --muted: #647084;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --warn: #b45309;
        --danger: #b42318;
        --ok-bg: #e6f4f1;
        --warn-bg: #fff3df;
        --danger-bg: #fde7e7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .topbar {
        max-width: 1440px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 700;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 28px;
        padding: 0 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .badge.ok { background: var(--ok-bg); color: var(--accent-strong); border-color: #a7d8cf; }
      .badge.warn { background: var(--warn-bg); color: var(--warn); border-color: #f5d59e; }
      .badge.danger { background: var(--danger-bg); color: var(--danger); border-color: #f1b3ae; }

      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 18px 20px 24px;
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 16px;
      }

      section, aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .controls {
        padding: 16px;
        align-self: start;
      }

      .panel-title {
        margin: 0 0 12px;
        font-size: 14px;
        color: #344054;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 13px;
        color: var(--muted);
      }

      input, select {
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        padding: 7px 9px;
        font: inherit;
        font-size: 14px;
      }

      input[type="checkbox"] {
        width: 16px;
        min-height: 16px;
      }

      .inline {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
        color: var(--muted);
        font-size: 13px;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      button.primary:hover { background: var(--accent-strong); }
      button.danger { color: var(--danger); border-color: #f0b8b2; background: #fffafa; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }

      .workspace {
        display: grid;
        gap: 16px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        min-height: 74px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .metric strong {
        display: block;
        font-size: 24px;
        line-height: 1.1;
      }

      .transcript-panel {
        min-height: 360px;
        display: grid;
        grid-template-rows: auto auto minmax(260px, 1fr);
      }

      .panel-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .toolbar {
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 10px;
      }

      .transcript-list {
        overflow: auto;
        max-height: 58vh;
      }

      .empty {
        color: var(--muted);
        padding: 34px 16px;
        text-align: center;
      }

      .entry {
        display: grid;
        grid-template-columns: 96px 90px minmax(0, 1fr);
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid #eef1f5;
        align-items: start;
      }

      .entry time {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .speaker {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        background: #eef7ff;
        color: #075985;
      }

      .speaker.me {
        background: #e6f4f1;
        color: #0b5f59;
      }

      .entry p {
        margin: 0;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .log-panel {
        display: grid;
        grid-template-rows: auto minmax(180px, 28vh);
      }

      pre {
        margin: 0;
        padding: 12px 16px;
        overflow: auto;
        background: #111827;
        color: #d1d5db;
        font-size: 12px;
        line-height: 1.45;
        border-radius: 0 0 8px 8px;
        white-space: pre-wrap;
      }

      .path {
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 980px) {
        main {
          grid-template-columns: 1fr;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status-row {
          justify-content: flex-start;
        }

        .inline, .buttons, .toolbar {
          grid-template-columns: 1fr;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        .entry {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <h1>PLN Meeting Transcriber</h1>
        <div class="status-row">
          <span id="serverBadge" class="badge warn">Server checking</span>
          <span id="sessionBadge" class="badge">Client idle</span>
          <span id="pathBadge" class="badge">audio/transcript_log.json</span>
        </div>
      </div>
    </header>

    <main>
      <aside class="controls">
        <h2 class="panel-title">Live Control</h2>
        <div class="inline">
          <div class="field">
            <label for="host">Server Host</label>
            <input id="host" value="localhost" autocomplete="off" />
          </div>
          <div class="field">
            <label for="port">WS Port</label>
            <input id="port" type="number" min="1" max="65535" value="9090" />
          </div>
        </div>
        <div class="inline">
          <div class="field">
            <label for="source">Source</label>
            <select id="source">
              <option value="both">Mic + Speaker</option>
              <option value="mic">Mic</option>
              <option value="speaker">Speaker</option>
            </select>
          </div>
          <div class="field">
            <label for="model">Model</label>
            <select id="model">
              <option value="large-v3-turbo">large-v3-turbo</option>
              <option value="medium">medium</option>
              <option value="small">small</option>
              <option value="base">base</option>
            </select>
          </div>
        </div>
        <div class="inline">
          <div class="field">
            <label for="vad">VAD Threshold</label>
            <input id="vad" type="number" min="0.1" max="0.95" step="0.01" value="0.55" />
          </div>
          <div class="field">
            <label for="noSpeech">No Speech Filter</label>
            <input id="noSpeech" type="number" min="0.1" max="0.95" step="0.01" value="0.45" />
          </div>
        </div>
        <div class="inline">
          <div class="field">
            <label for="readyTimeout">Ready Timeout</label>
            <input id="readyTimeout" type="number" min="30" step="10" value="300" />
          </div>
          <div class="field">
            <label for="finalDrain">Final Drain</label>
            <input id="finalDrain" type="number" min="0" step="1" value="8" />
          </div>
        </div>
        <div class="inline">
          <div class="field">
            <label for="agreementWindow">Agreement Window</label>
            <input id="agreementWindow" type="number" min="3" max="30" step="1" value="15" />
          </div>
          <div class="field">
            <label for="agreementHop">Agreement Hop</label>
            <input id="agreementHop" type="number" min="0.2" max="5" step="0.1" value="2" />
          </div>
        </div>
        <div class="inline">
          <div class="field">
            <label for="language">Language</label>
            <input id="language" value="id" autocomplete="off" />
          </div>
          <div class="field">
            <label for="logLevel">Log Level</label>
            <select id="logLevel">
              <option value="INFO">INFO</option>
              <option value="DEBUG">DEBUG</option>
              <option value="WARNING">WARNING</option>
              <option value="ERROR">ERROR</option>
            </select>
          </div>
        </div>
        <label class="check-row"><input id="localAgreement" type="checkbox" checked /> Local agreement</label>
        <label class="check-row"><input id="dynamicPrompt" type="checkbox" checked /> Dynamic prompt</label>
        <label class="check-row"><input id="hidePartials" type="checkbox" checked /> Hide unstable partials</label>
        <label class="check-row"><input id="resetTranscript" type="checkbox" checked /> Archive old transcript on start</label>
        <div class="buttons">
          <button id="startBtn" class="primary">Start</button>
          <button id="stopBtn" class="danger" disabled>Stop</button>
        </div>
        <div class="buttons">
          <button id="archiveBtn">Archive Transcript</button>
          <button id="forceBtn" class="danger">Force Stop</button>
        </div>
      </aside>

      <div class="workspace">
        <div class="metrics">
          <div class="metric"><span>Total</span><strong id="totalCount">0</strong></div>
          <div class="metric"><span>Me</span><strong id="micCount">0</strong></div>
          <div class="metric"><span>Meeting</span><strong id="speakerCount">0</strong></div>
          <div class="metric"><span>Elapsed</span><strong id="elapsed">0s</strong></div>
        </div>

        <section class="transcript-panel">
          <div class="panel-head">
            <h2>Transcript</h2>
            <span id="updatedAt" class="path">Not saved yet</span>
          </div>
          <div class="toolbar">
            <select id="filter">
              <option value="all">All sources</option>
              <option value="mic">Me</option>
              <option value="speaker">Meeting</option>
            </select>
            <input id="search" placeholder="Search transcript" />
          </div>
          <div id="transcript" class="transcript-list">
            <div class="empty">Transcript belum tersedia.</div>
          </div>
        </section>

        <section class="log-panel">
          <div class="panel-head">
            <h2>Client Log</h2>
            <span id="commandText" class="path"></span>
          </div>
          <pre id="logs"></pre>
        </section>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let latestEntries = [];

      function payload() {
        return {
          host: $("host").value.trim() || "localhost",
          port: Number($("port").value || 9090),
          source: $("source").value,
          model: $("model").value,
          language: $("language").value.trim() || "id",
          vadThreshold: Number($("vad").value || 0.55),
          noSpeechThresh: Number($("noSpeech").value || 0.45),
          readyTimeout: Number($("readyTimeout").value || 300),
          finalDrainSeconds: Number($("finalDrain").value || 8),
          localAgreement: $("localAgreement").checked,
          localAgreementWindowSeconds: Number($("agreementWindow").value || 15),
          localAgreementHopSeconds: Number($("agreementHop").value || 2),
          dynamicPrompt: $("dynamicPrompt").checked,
          logLevel: $("logLevel").value,
          hidePartials: $("hidePartials").checked,
          resetTranscript: $("resetTranscript").checked
        };
      }

      async function post(url, body = {}) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        return res.json();
      }

      async function refresh() {
        const res = await fetch("/api/status");
        const data = await res.json();
        renderStatus(data);
        renderTranscript(data.transcript.entries || []);
        renderLogs(data.logs || []);
      }

      function renderStatus(data) {
        const server = data.server || {};
        const session = data.session || {};
        const transcript = data.transcript || {};

        $("serverBadge").className = "badge " + (server.healthy ? "ok" : "danger");
        $("serverBadge").textContent = server.healthy ? "Docker server healthy" : "Docker server offline";
        $("sessionBadge").className = "badge " + (session.running ? "ok" : (session.stop_requested ? "warn" : ""));
        $("sessionBadge").textContent = session.running ? `Client running pid ${session.pid}` : "Client idle";
        $("pathBadge").textContent = transcript.path || "audio/transcript_log.json";
        $("totalCount").textContent = transcript.count || 0;
        $("micCount").textContent = transcript.counts?.mic || 0;
        $("speakerCount").textContent = transcript.counts?.speaker || 0;
        $("elapsed").textContent = session.elapsed_seconds ? `${Math.round(session.elapsed_seconds)}s` : "0s";
        $("updatedAt").textContent = transcript.updated_at ? `Updated ${new Date(transcript.updated_at).toLocaleTimeString()}` : "Not saved yet";
        $("commandText").textContent = session.command?.length ? session.command.join(" ") : "";
        $("startBtn").disabled = !!session.running;
        $("stopBtn").disabled = !session.running;
      }

      function renderTranscript(entries) {
        latestEntries = entries;
        const sourceFilter = $("filter").value;
        const query = $("search").value.trim().toLowerCase();
        const filtered = entries.filter((entry) => {
          const sourceOk = sourceFilter === "all" || entry.source === sourceFilter;
          const text = `${entry.text || ""} ${entry.display || ""}`.toLowerCase();
          return sourceOk && (!query || text.includes(query));
        });

        if (!filtered.length) {
          $("transcript").innerHTML = '<div class="empty">Transcript belum tersedia.</div>';
          return;
        }

        $("transcript").innerHTML = filtered.map((entry) => {
          const source = entry.source || "other";
          const label = entry.label || (source === "mic" ? "Me" : "Meeting");
          const start = seconds(entry.start_seconds);
          const end = seconds(entry.end_seconds);
          const speakerClass = source === "mic" ? "speaker me" : "speaker";
          return `<article class="entry">
            <time>${start} - ${end}</time>
            <span class="${speakerClass}">${escapeHtml(label)}</span>
            <p>${escapeHtml(entry.text || "")}</p>
          </article>`;
        }).join("");
      }

      function renderLogs(lines) {
        $("logs").textContent = lines.join("\n");
        $("logs").scrollTop = $("logs").scrollHeight;
      }

      function seconds(value) {
        const total = Math.max(0, Math.round(Number(value || 0)));
        const min = Math.floor(total / 60).toString().padStart(2, "0");
        const sec = (total % 60).toString().padStart(2, "0");
        return `${min}:${sec}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      $("startBtn").addEventListener("click", async () => {
        await post("/api/start", payload());
        refresh();
      });
      $("stopBtn").addEventListener("click", async () => {
        await post("/api/stop");
        refresh();
      });
      $("forceBtn").addEventListener("click", async () => {
        await post("/api/force-stop");
        refresh();
      });
      $("archiveBtn").addEventListener("click", async () => {
        await post("/api/archive-transcript");
        refresh();
      });
      $("filter").addEventListener("change", () => renderTranscript(latestEntries));
      $("search").addEventListener("input", () => renderTranscript(latestEntries));

      refresh();
      setInterval(refresh, 1500);
    </script>
  </body>
</html>
