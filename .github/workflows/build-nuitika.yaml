name: Build Client with Nuitka

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ListenPLN-Windows.exe
          - os: macos-latest
            artifact_name: ListenPLN-Mac

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Sistem Audio (PortAudio)
      # sounddevice membutuhkan library PortAudio di level OS.
      # Di Windows, wheel sounddevice sudah membundel PortAudio DLL.
      # Di macOS, perlu install via Homebrew.
      - name: Install PortAudio (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio

      # 4. Install UV
      - name: Install UV (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install UV (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.local\bin"

      # 4b. W4: tag rilis wajib sama dengan src/version.py __version__. Tanpa gerbang
      # ini, installer/handshake/tag dapat menyimpang diam-diam dan penegakan versi
      # menolak klien yang sebenarnya baru.
      - name: Verify release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          app=$(python -c "import re,pathlib;print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('src/version.py').read_text()).group(1))")
          echo "tag=$tag app_version=$app"
          if [ "$tag" != "$app" ]; then
            echo "::error::release tag v$tag does not match src/version.py ($app)"
            exit 1
          fi

      # 5. Install Dependensi
      # Install secara selektif TANPA openai-whisper dan numba.
      # openai-whisper menarik PyTorch (~1.5GB) yang TIDAK dibutuhkan oleh
      # qt_client — client hanya mengirim audio via WebSocket ke server.
      # numba adalah transitive dep dari whisper, juga tidak dibutuhkan.
      - name: Install Dependencies
        shell: bash
        run: |
          pip install PySide6 numpy sounddevice soundcard scipy websocket-client
          pip install nuitka ordered-set

      # 6. Build dengan Nuitka
      # --assume-yes-for-downloads: Otomatis download MinGW C compiler jika belum ada
      # --include-package=src: Pastikan semua modul src.* masuk ke bundle
      # --nofollow-import-to: Exclude package berat yang tidak dibutuhkan runtime client
      # --include-package-data=soundcard: soundcard (CFFI) membaca file .h di sebelah
      #   modulnya saat import (mediafoundation.py.h di Windows, coreaudio.py.h di macOS).
      #   --include-module hanya membawa bytecode, BUKAN file data -> import gagal dengan
      #   FileNotFoundError di dalam onefile. Flag ini yang membawa file .h tersebut.
      # --include-windows-runtime-dlls=no: JANGAN bundel Windows C runtime (UCRT) dari
      #   mesin build. Default Nuitka 'auto' memanen api-ms-win-crt-*.dll dari runner CI
      #   (yang punya Visual Studio/Windows SDK) dan menaruhnya di payload onefile. Saat
      #   diekstrak di mesin target, loader Windows memuat stub asing itu lebih dulu dan
      #   menolaknya -> "Bad Image". UCRT adalah komponen OS pada Windows 10/11, jadi
      #   target harus memakai milik OS-nya sendiri (sesuai panduan Microsoft: apiset
      #   api-ms-win-* tidak boleh diredistribusi antar-versi Windows).
      #   CI tidak dapat menangkap kelas bug ini: di runner, mesin build = mesin uji.
      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --plugin-enable=pyside6 ^
            --include-data-dir=src/icon=src/icon ^
            --windows-icon-from-ico=src/icon/app.ico ^
            --include-data-dir=config=config ^
            --include-package=src ^
            --include-module=sounddevice ^
            --include-module=soundcard ^
            --include-package-data=soundcard ^
            --nofollow-import-to=whisper,numba,torch,torchaudio ^
            --include-windows-runtime-dlls=no ^
            --windows-console-mode=disable ^
            --remove-output ^
            --assume-yes-for-downloads ^
            src/app.py
          move app.exe ListenPLN-Windows.exe

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          # Cari dan salin libportaudio.dylib lokal agar bisa ikut di-bundle
          PORTAUDIO_PATH=$(find /opt/homebrew /usr/local -name "libportaudio.dylib" 2>/dev/null | head -n 1)
          EXTRA_ARGS=""
          if [ -n "$PORTAUDIO_PATH" ]; then
            echo "Found libportaudio.dylib at $PORTAUDIO_PATH, copying for bundling..."
            cp "$PORTAUDIO_PATH" ./libportaudio.dylib
            EXTRA_ARGS="--include-data-file=libportaudio.dylib=libportaudio.dylib"
          else
            echo "WARNING: libportaudio.dylib not found!"
          fi

          python -m nuitka \
            --standalone \
            --onefile \
            --plugin-enable=pyside6 \
            --include-data-dir=src/icon=src/icon \
            --include-data-dir=config=config \
            --include-package=src \
            $EXTRA_ARGS \
            --include-module=sounddevice \
            --include-module=soundcard \
            --include-package-data=soundcard \
            --nofollow-import-to=whisper,numba,torch,torchaudio \
            --remove-output \
            --assume-yes-for-downloads \
            src/app.py
          mv app.bin ListenPLN-Mac 2>/dev/null || mv app ListenPLN-Mac

      # 6b. Smoke test: buktikan exe packaged menjalankan jalur CLI (bukan hanya --help),
      # dan stdout jalur CLI sampai ke parent via PIPE (kritis untuk protokol sentinel).
      - name: Smoke test packaged CLI dispatch (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/ci_smoke_packaged_cli.py .\ListenPLN-Windows.exe

      # 6c. Build installer profesional (Inno Setup, per-user) dari exe hasil Nuitka.
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows Installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ($env:GITHUB_REF -like "refs/tags/v*") { $ver = $env:GITHUB_REF -replace "refs/tags/v","" }
          Write-Host "Installer version: $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" installer\windows\setup.iss
          if (-not (Test-Path ".\ListenPLN-Setup.exe")) { Write-Error "installer not produced"; exit 1 }

      # 6d. Smoke installer: silent install -> exe terpasang menjalankan jalur CLI -> uninstall bersih.
      - name: Smoke test installer (install / CLI run / uninstall)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = Join-Path $env:TEMP "pln_install_test"
          Start-Process -Wait -FilePath ".\ListenPLN-Setup.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/DIR=$dir"
          $exe = Join-Path $dir "ListenPLN.exe"
          if (-not (Test-Path $exe)) { Write-Error "installer did not place exe at $exe"; exit 1 }
          python scripts/ci_smoke_packaged_cli.py $exe
          if ($LASTEXITCODE -ne 0) { Write-Error "installed exe failed CLI smoke"; exit 1 }
          Start-Process -Wait -FilePath (Join-Path $dir "unins000.exe") -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          if (Test-Path $exe) { Write-Error "uninstall left files behind"; exit 1 }
          Write-Host "OK: install -> CLI runs via PIPE -> uninstall clean"

      - name: Upload Windows Installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ListenPLN-Setup.exe
          path: ListenPLN-Setup.exe
          if-no-files-found: error

      # 7. Upload Artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  # 8. Release (hanya saat push tag v*)
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ListenPLN-Setup.exe
            ListenPLN-Mac
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
