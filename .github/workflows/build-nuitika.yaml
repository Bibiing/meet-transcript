name: Build Client with Nuitka

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Memicu build otomatis saat membuat tag versi baru, misal v1.0.0
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Melakukan build paralel untuk Windows (menghasilkan .exe) dan macOS (menghasilkan biner Unix/macOS)
        os: [windows-latest, macos-latest]

    steps:
    # 1. Checkout source code dari repositori Git
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup environment Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Mempercepat build selanjutnya dengan caching pip dependencies

    # 3. Install compiler C (hanya untuk macOS, Windows sudah terpasang MSVC/gcc secara default di GitHub Runner)
    - name: Install macOS Compiler Tools
      if: matrix.os == 'macos-latest'
      run: |
        xcode-select --install || true

    # 4. Install UV (Modern package manager untuk Python)
    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    # 5. Install seluruh dependensi proyek & compiler Nuitka
    - name: Install Dependencies
      run: |
        uv pip install --system .
        uv pip install --system nuitka ordered-set

    # 6. Kompilasi menggunakan Nuitka (Windows)
    - name: Build with Nuitka (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        uv run python -m nuitka --standalone --onefile --plugin-enable=pyqt6 --include-data-dir=src/icon=src/icon --windows-icon-from-ico=src/icon/app_logo.png --disable-console --remove-output src/qt_client.py
        # Ganti nama biner agar mudah dikenali
        mv qt_client.exe MultiTranscriber-Windows.exe

    # 7. Kompilasi menggunakan Nuitka (macOS)
    - name: Build with Nuitka (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        uv run python -m nuitka --standalone --onefile --plugin-enable=pyqt6 --include-data-dir=src/icon=src/icon --disable-console --remove-output src/qt_client.py
        # Di mac, output Nuitka onefile berupa biner tunggal. Ganti nama biner agar mudah dikenali.
        mv qt_client MultiTranscriber-Mac

    # 8. Upload hasil build sebagai Artifacts di GitHub Action Run (bisa diunduh langsung)
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MultiTranscriber-${{ matrix.os }}
        path: |
          MultiTranscriber-Windows.exe
          MultiTranscriber-Mac
        if-no-files-found: error

    # 9. Jika dipicu oleh push tag rilis (v1.0.0, dll), otomatis buat Draft Release dan upload biner ke halaman Release
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          MultiTranscriber-Windows.exe
          MultiTranscriber-Mac
        draft: true # Dibuat sebagai Draft agar Anda bisa menulis catatan rilis (changelog) terlebih dahulu
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
