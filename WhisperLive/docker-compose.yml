services:
  whisperlive:
    build:
      context: .
      dockerfile: docker/Dockerfile.gpu
    image: ${WHISPERLIVE_IMAGE:-pln-whisperlive:gpu}
    ports:
      - "${WHISPERLIVE_WS_PORT:-9090}:9090"
    volumes:
      - whisperlive-cache:/models
      - ../logs/whisperlive:/app/logs
    environment:
      OMP_NUM_THREADS: "${WHISPERLIVE_OMP_NUM_THREADS:-1}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      WHISPERLIVE_INITIAL_PROMPT: "${WHISPERLIVE_INITIAL_PROMPT:-}"
      WHISPERLIVE_HOTWORDS: "${WHISPERLIVE_HOTWORDS:-}"
      WHISPERLIVE_FORCE_SERVER_PROMPT: "${WHISPERLIVE_FORCE_SERVER_PROMPT:-true}"
      WHISPERLIVE_DEFAULT_MODEL: "${WHISPERLIVE_DEFAULT_MODEL:-medium}"
      WHISPERLIVE_PROCESS_LOG: "${WHISPERLIVE_PROCESS_LOG:-/app/logs/process.log}"
    gpus: all
    command:
      - python
      - run_server.py
      - --port
      - "9090"
      - --backend
      - faster_whisper
      - --default_model
      - "${WHISPERLIVE_DEFAULT_MODEL:-medium}"
      - --max_clients
      - "${WHISPERLIVE_MAX_CLIENTS:-4}"
      - --max_connection_time
      - "${WHISPERLIVE_MAX_CONNECTION_TIME:-600}"
      - --cache_path
      - /models

volumes:
  whisperlive-cache:
